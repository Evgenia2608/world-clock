<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=ABeeZee:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>World Clock - Yevheniia Olinovska</title>
</head>
<body>
  <div class="container">
  <h1>World Clock</h1>

  <select>
    <option value="">Select a city...</option>
    <option value="">London</option>
    <option value="">New York</option>
    <option value="">Auckland</option>
  </select>

  <div class="city">
    <div>
    <h2>Los Angeles</h2>
    <div class="date">July 6th 2026</div>
    </div>
    <div class="time">07:41:35 <small> PM </small></div>
  </div>

  <div class="city">
    <div>
    <h2>Sydney</h2>
    <div class="date">July 6th 2026</div>
    </div>
    <div class="time">07:41:35 <small> PM </small> </div>
  </div>

  </div>
  <footer>
    This project was coded by <strong>Yevheniia Olinovska </strong>and is <a href="https://github.com/Evgenia2608/world-clock" target="_blank">open sourced on Github </a>  
  </footer>
  <script src="javascript/index.js"></script>
</body>
</html>
